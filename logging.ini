# Phyxel Engine Logging Configuration
# Log Levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF

[General]
# Global log level - applies to all modules unless overridden
global_level=INFO

# Output options
console_output=true
file_output=true
log_file=phyxel.log

# Formatting options
timestamps=true
colors=true
module_names=true
thread_ids=false

[Modules]
# Per-module log levels - override global level for specific modules
# Uncomment and adjust as needed for debugging

# Core modules
Application=INFO
Vulkan=INFO
Physics=INFO
Rendering=INFO
Chunk=INFO
Performance=INFO

# Detailed modules (enable DEBUG or TRACE for troubleshooting)
# VulkanDevice=DEBUG
# RenderPipeline=DEBUG
# ChunkManager=DEBUG
# PhysicsWorld=DEBUG
# SceneManager=DEBUG

# Very detailed tracing (use sparingly - generates lots of output)
# Collision=TRACE
# BufferUpdate=TRACE
# FaceCulling=TRACE
# HoverDetection=TRACE

# Disable specific modules if too noisy
# ImGui=OFF
# Timer=OFF
