# Phyxel Engine Logging Configuration
# Log Levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF

[General]
# Global log level - applies to all modules unless overridden
global_level=INFO

# Output options
console_output=true
file_output=true
log_file=phyxel.log

# Formatting options
timestamps=true
colors=true
module_names=true
thread_ids=false

[Modules]
# Per-module log levels - override global level for specific modules
# All modules below are actively used in the codebase
# Uncomment and adjust as needed for debugging

# === Core Application ===
Application=INFO              # Main application logic, user interactions
Main=INFO                     # Application startup

# === Graphics & Rendering ===
Rendering=INFO                # Frame rendering, Vulkan operations
Vulkan=INFO                   # Vulkan device, validation

# === World & Chunks ===
Chunk=INFO                    # Chunk operations, collision system
ChunkManager=INFO             # Global chunk management, dynamic cubes
WorldStorage=DEBUG            # Database persistence
WorldGenerator=INFO           # Procedural world generation

# === Physics & Materials ===
Physics=INFO                  # Physics world operations
ForceSystem=INFO              # Force propagation system

# === Scene & UI ===
Scene=INFO                    # Scene management
UI=INFO                       # ImGui rendering
Performance=INFO              # Performance metrics

# === Detailed Debug (uncomment for troubleshooting) ===
# Application=DEBUG           # Enable for user interaction debugging
# Chunk=DEBUG                 # Enable for collision/voxel debugging  
# ChunkManager=DEBUG          # Enable for dynamic cube tracking
WorldStorage=DEBUG            # Enable for database operation details
VoxelInteraction=DEBUG        # Enable for face detection debugging
# Rendering=DEBUG             # Enable for rendering pipeline details
# Physics=DEBUG               # Enable for physics debugging

# === Very Detailed Tracing (use sparingly - generates lots of output) ===
# Chunk=TRACE                 # Collision entity tracking, spatial grid details
# Rendering=TRACE             # Frame rendering step-by-step

# === Disable Noisy Modules ===
# Performance=OFF             # Disable performance stats output
# Scene=OFF                   # Disable scene update messages

